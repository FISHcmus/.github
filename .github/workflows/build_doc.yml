name: "build doc"
on:
  push:
    branches:
      - master

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-doc:
    runs-on: ubuntu-latest
    steps:
      -   name: "check out quartz custom template "
          uses: actions/checkout@v4
          with:
            repository: "nhannht/quartz"
            fetch-depth: 0
            ref: v4
            path: quartz

      -   name: check out this repo
          uses: actions/checkout@v4
          with:
            fetch-depth: 0
            path: fishcmus


      -   name: set up node
          uses: actions/setup-node@v4
          with:
            node-version: '>=22'


      -   name: build and deploy doc
#          env:
#            CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
#            CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          run:  |
            cd quartz
            yarn 
            yarn add wrangler -D
            cp ../fishcmus/* ./content/ -r
            cp ../fishcmus/quartz.config.ts ./
            cp ../fishcmus/quartz.layout.ts ./
            cp ../fiscmus/wrangler_config/wrangler_user_doc.toml ./wrangler.toml
            npx  quartz build
            npx wrangler pages deploy

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
            # Point this to your build output directory
          path: 'quartz/public'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-doc
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4